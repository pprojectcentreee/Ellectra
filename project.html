<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellectra - Project Inquiry</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#ffffff;--bg-secondary:#f5f5f0;--bg-card:#fff;--card-border:#e0e0d8;--card-shadow:0 2px 15px rgba(0,0,0,0.08);--yellow:#FFD700;--yellow-dark:#e6c200;--yellow-glow:rgba(255,215,0,0.3);--black:#000;--text-primary:#1a1a1a;--text-secondary:#555;--text-muted:#999;--danger:#e74c3c;--success:#27ae60;--border-color:#e0e0d8}
body{font-family:'Rajdhani',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
.navbar{position:fixed;top:0;left:0;right:0;height:70px;background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000}
.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo{width:40px;height:40px}
.nav-title{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--yellow)}
.nav-actions{display:flex;gap:12px}
.nav-btn{background:transparent;border:1px solid var(--yellow-dark);color:var(--yellow);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:600;transition:all 0.3s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-btn:hover{background:var(--yellow);color:var(--black)}
.hero{margin-top:70px;padding:50px 20px;text-align:center;background:var(--black)}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2rem;color:var(--yellow)}
.hero p{color:#aaa;font-size:1.1rem;margin-top:5px}
.form-container{max-width:650px;margin:40px auto;padding:0 20px}
.form-card{background:var(--bg-card);border:2px solid var(--border-color);border-radius:20px;padding:30px;box-shadow:var(--card-shadow)}
.form-card h3{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--black);margin-bottom:20px}
.form-card h3 i{color:var(--yellow-dark)}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-size:0.9rem;font-weight:600;color:var(--text-secondary)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;background:var(--bg-secondary);border:2px solid var(--border-color);color:var(--text-primary);border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1rem}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--yellow);outline:none}
.form-group textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.conditional{display:none;margin-top:5px;padding:15px;background:var(--bg-secondary);border-radius:10px;border:2px solid var(--border-color)}
.conditional.show{display:block}
.submit-btn{width:100%;padding:14px;background:var(--yellow);border:none;border-radius:12px;color:var(--black);font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:10px}
.submit-btn:hover{background:var(--yellow-dark)}
.footer{margin-top:60px;padding:30px 20px;text-align:center;background:var(--black)}
.footer-brand{font-family:'Orbitron',sans-serif;font-size:1.3rem;color:var(--yellow);margin-bottom:5px}
.footer p{color:#888;font-size:0.85rem}
.toast-container{position:fixed;top:80px;right:20px;z-index:5000;display:flex;flex-direction:column;gap:10px}
.toast{padding:12px 20px;background:var(--black);border:2px solid var(--yellow);border-radius:10px;color:#fff;font-weight:600;display:flex;align-items:center;gap:10px;animation:toast-in 0.3s ease;min-width:250px}
.toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
@keyframes toast-in{0%{opacity:0;transform:translateX(100px)}100%{opacity:1;transform:translateX(0)}}
@media(max-width:768px){.nav-btn span{display:none}.nav-btn{padding:8px 10px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<nav class="navbar"><a href="index.html" class="nav-brand"><img src="https://raw.githubusercontent.com/pprojectcentreee/Ellectra/main/Ellectra_w01wap%20(2).png" class="nav-logo"><span class="nav-title">ELLECTRA</span></a><div class="nav-actions"><a href="index.html" class="nav-btn"><i class="fas fa-home"></i><span>Home</span></a><a href="shop.html" class="nav-btn"><i class="fas fa-store"></i><span>Shop</span></a><a href="service.html" class="nav-btn"><i class="fas fa-tools"></i><span>Services</span></a></div></nav>
<section class="hero"><h1>⚡ PROJECT INQUIRY</h1><p>Custom Electronics Projects for College & Companies</p></section>
<div class="form-container">
<div class="form-card">
<h3><i class="fas fa-project-diagram"></i> Submit Your Project Request</h3>
<div class="form-row">
<div class="form-group"><label>Full Name *</label><input type="text" id="proj-name"></div>
<div class="form-group"><label>Phone Number *</label><input type="tel" id="proj-phone" placeholder="+91 XXXXXXXXXX"></div>
</div>
<div class="form-group"><label>Email *</label><input type="email" id="proj-email"></div>
<div class="form-group"><label>You are from *</label>
<select id="proj-type" onchange="toggleType()">
<option value="">Select</option>
<option value="college">College / University</option>
<option value="company">Company / Organization</option>
</select>
</div>
<div class="conditional" id="college-fields">
<div class="form-group"><label>College / University Name *</label><input type="text" id="proj-college"></div>
<div class="form-group"><label>Department *</label><input type="text" id="proj-department" placeholder="e.g. ECE, CSE, EEE"></div>
</div>
<div class="conditional" id="company-fields">
<div class="form-group"><label>Company Name *</label><input type="text" id="proj-company"></div>
<div class="form-group"><label>Company Industry / Domain</label><input type="text" id="proj-industry" placeholder="e.g. IoT, Automation, Healthcare"></div>
<div class="form-group"><label>Your Role / Designation</label><input type="text" id="proj-role"></div>
</div>
<div class="form-group"><label>Project Title *</label><input type="text" id="proj-title" placeholder="Brief title of your project"></div>
<div class="form-group"><label>Project Description / Requirements *</label><textarea id="proj-desc" placeholder="Describe in detail what you need built, features required, timeline, budget range etc..."></textarea></div>
<button class="submit-btn" onclick="submitProject()" id="proj-btn"><i class="fas fa-paper-plane"></i> SUBMIT PROJECT REQUEST</button>
</div>
</div>
<footer class="footer"><div class="footer-brand">⚡ ELLECTRA</div><p>© 2025 Ellectra</p></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAJm0fEDPItyL6nBMWzWGQnSAjreDlCOpQ",authDomain:"ellectra-2b95d.firebaseapp.com",projectId:"ellectra-2b95d",storageBucket:"ellectra-2b95d.firebasestorage.app",messagingSenderId:"164410965069",appId:"1:164410965069:web:b86f8fd714f84c27e3f004"});
const db=firebase.firestore(),WA="916381733447";

function toggleType(){const v=document.getElementById('proj-type').value;document.getElementById('college-fields').className='conditional'+(v==='college'?' show':'');document.getElementById('company-fields').className='conditional'+(v==='company'?' show':'');}

async function submitProject(){
const n=document.getElementById('proj-name').value.trim(),p=document.getElementById('proj-phone').value.trim(),e=document.getElementById('proj-email').value.trim(),type=document.getElementById('proj-type').value,title=document.getElementById('proj-title').value.trim(),desc=document.getElementById('proj-desc').value.trim();
if(!n||!p||!e||!type||!title||!desc){showToast('Fill all required fields','error');return;}
const btn=document.getElementById('proj-btn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Submitting...';
try{
const data={name:n,phone:p,email:e,type,title,description:desc,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()};
if(type==='college'){data.collegeName=document.getElementById('proj-college').value.trim();data.department=document.getElementById('proj-department').value.trim();if(!data.collegeName||!data.department){showToast('Fill college details','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> SUBMIT PROJECT REQUEST';return;}}
if(type==='company'){data.companyName=document.getElementById('proj-company').value.trim();data.industry=document.getElementById('proj-industry').value.trim();data.role=document.getElementById('proj-role').value.trim();if(!data.companyName){showToast('Fill company name','error');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> SUBMIT PROJECT REQUEST';return;}}
await db.collection('projectRequests').add(data);
let m='*PROJECT REQUEST - ELLECTRA*\n\nName: '+n+'\nPhone: '+p+'\nEmail: '+e+'\nType: '+type.toUpperCase()+'\n';
if(type==='college')m+='College: '+data.collegeName+'\nDept: '+data.department+'\n';
if(type==='company')m+='Company: '+data.companyName+'\nIndustry: '+(data.industry||'N/A')+'\nRole: '+(data.role||'N/A')+'\n';
m+='\nProject: '+title+'\n\nDetails:\n'+desc;
window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(m),'_blank');
showToast('Request submitted! ⚡','success');
document.getElementById('proj-name').value='';document.getElementById('proj-phone').value='';document.getElementById('proj-email').value='';document.getElementById('proj-type').value='';document.getElementById('proj-title').value='';document.getElementById('proj-desc').value='';toggleType();
}catch(err){showToast('Error submitting','error');}
finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> SUBMIT PROJECT REQUEST';}
}

function showToast(msg,type='success'){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast '+type;t.innerHTML='<i class="fas '+(type==='success'?'fa-check-circle':'fa-exclamation-circle')+'" style="color:'+(type==='success'?'var(--success)':'var(--danger)')+'"></i>'+msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(100px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},3000);}
</script>
</body>
</html>
