<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Ellectra - Shop Components</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#ffffff;--bg-secondary:#f5f5f0;--bg-card:#fff;--card-border:#e0e0d8;--card-shadow:0 2px 15px rgba(0,0,0,0.08);--yellow:#FFD700;--yellow-dark:#e6c200;--yellow-light:#fff8dc;--yellow-glow:rgba(255,215,0,0.3);--black:#000;--black-soft:#1a1a1a;--text-primary:#1a1a1a;--text-secondary:#555;--text-muted:#999;--danger:#e74c3c;--success:#27ae60;--border-color:#e0e0d8}
html{scroll-behavior:smooth}
body{font-family:'Rajdhani',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#f0f0f0}::-webkit-scrollbar-thumb{background:var(--yellow-dark);border-radius:4px}

.navbar{position:fixed;top:0;left:0;right:0;height:70px;background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo{width:40px;height:40px;filter:drop-shadow(0 0 8px var(--yellow-glow))}
.nav-title{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--yellow)}
.nav-actions{display:flex;align-items:center;gap:12px}
.nav-btn{background:transparent;border:1px solid var(--yellow-dark);color:var(--yellow);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:600;transition:all 0.3s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-btn:hover{background:var(--yellow);color:var(--black)}
.cart-badge{position:relative}
.cart-count{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}
.user-avatar{width:35px;height:35px;border-radius:50%;border:2px solid var(--yellow);cursor:pointer}
.user-info{display:flex;align-items:center;gap:8px}
.user-name{font-size:0.85rem;color:var(--yellow);font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.hero{margin-top:70px;padding:40px 20px;text-align:center;background:var(--black)}
.hero h1{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--yellow);text-shadow:0 0 20px var(--yellow-glow)}
.hero p{font-size:1.1rem;color:#aaa}

.search-section{padding:20px;max-width:800px;margin:0 auto}
.search-box{display:flex;gap:10px;background:var(--bg-card);border:2px solid var(--border-color);border-radius:12px;padding:8px;transition:border-color 0.3s;box-shadow:var(--card-shadow)}
.search-box:focus-within{border-color:var(--yellow)}
.search-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-size:1rem;font-family:'Rajdhani',sans-serif;padding:8px 12px}
.search-box input::placeholder{color:var(--text-muted)}
.search-box button{background:var(--yellow);border:none;color:var(--black);padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:700}
.category-filters{display:flex;gap:8px;margin-top:15px;overflow-x:auto;padding-bottom:5px;flex-wrap:wrap;justify-content:center}
.cat-btn{background:var(--bg-card);border:2px solid var(--border-color);color:var(--text-secondary);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;white-space:nowrap;transition:all 0.3s}
.cat-btn:hover,.cat-btn.active{background:var(--yellow);color:var(--black);border-color:var(--yellow)}

.products-section{padding:20px;max-width:1400px;margin:0 auto}
.products-section h2{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--black);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.products-section h2 i{color:var(--yellow-dark)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.product-card{background:var(--bg-card);border:2px solid var(--border-color);border-radius:16px;overflow:hidden;transition:all 0.3s;cursor:pointer;box-shadow:var(--card-shadow)}
.product-card:hover{transform:translateY(-5px);border-color:var(--yellow);box-shadow:0 10px 35px rgba(255,215,0,0.2)}
.product-card:hover .product-img img{transform:scale(1.05)}
.product-img{height:200px;overflow:hidden;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;position:relative}
.product-img img{max-width:100%;max-height:100%;object-fit:contain;padding:15px;transition:transform 0.3s}
.product-stock{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:700}
.stock-in{background:#d4edda;color:#155724}.stock-out{background:#f8d7da;color:#721c24}
.product-info{padding:15px}
.product-name{font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-category{font-size:0.8rem;color:var(--yellow-dark);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.product-price{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:var(--black)}
.add-cart-btn{width:100%;padding:12px;background:var(--yellow);border:none;border-radius:0 0 14px 14px;color:var(--black);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-cart-btn:hover{background:var(--yellow-dark)}
.add-cart-btn:disabled{background:#ccc;color:#888;cursor:not-allowed}
.no-products{text-align:center;padding:60px 20px;color:var(--text-muted);grid-column:1/-1}
.no-products i{font-size:3rem;margin-bottom:15px;color:var(--yellow-dark)}

.cart-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;opacity:0;visibility:hidden;transition:all 0.3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-sidebar{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100%;background:var(--bg-primary);z-index:2001;transition:right 0.4s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-left:2px solid var(--border-color);box-shadow:-5px 0 30px rgba(0,0,0,0.15)}
.cart-sidebar.open{right:0}
.cart-header{padding:20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border-color);background:var(--black)}
.cart-header h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--yellow)}
.cart-close{background:none;border:none;color:var(--yellow);font-size:1.5rem;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:15px}
.cart-item{display:flex;gap:12px;padding:12px;margin-bottom:10px;background:var(--bg-card);border-radius:12px;border:2px solid var(--border-color)}
.cart-item-img{width:60px;height:60px;border-radius:8px;overflow:hidden;background:var(--bg-secondary);flex-shrink:0}
.cart-item-img img{width:100%;height:100%;object-fit:contain;padding:5px}
.cart-item-info{flex:1}
.cart-item-name{font-size:0.9rem;font-weight:600;margin-bottom:3px}
.cart-item-price{font-size:0.85rem;color:var(--black);font-weight:700}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:5px}
.qty-btn{width:26px;height:26px;background:var(--yellow);border:none;color:var(--black);border-radius:6px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-btn:hover{background:var(--yellow-dark)}
.cart-item-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.1rem;align-self:flex-start}
.cart-empty{text-align:center;padding:40px;color:var(--text-muted)}
.cart-empty i{font-size:3rem;margin-bottom:10px;color:#ddd}
.cart-footer{padding:20px;border-top:2px solid var(--border-color)}
.coupon-section{display:flex;gap:8px;margin-bottom:15px}
.coupon-section input{flex:1;background:var(--bg-secondary);border:2px solid var(--border-color);color:var(--text-primary);padding:10px 12px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:0.9rem}
.coupon-section input:focus{border-color:var(--yellow);outline:none}
.coupon-section button{background:var(--yellow);color:var(--black);border:none;padding:10px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif}
.coupon-msg{font-size:0.8rem;margin-bottom:10px;padding:6px 10px;border-radius:6px;display:none}
.coupon-msg.success{display:block;background:#d4edda;color:#155724}
.coupon-msg.error{display:block;background:#f8d7da;color:#721c24}
.cart-summary{margin-bottom:15px}
.cart-summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:0.95rem}
.cart-summary-row.total{font-size:1.2rem;font-weight:700;color:var(--black);border-top:2px solid var(--border-color);padding-top:10px;margin-top:5px;font-family:'Orbitron',sans-serif}
.cart-summary-row.discount{color:var(--success)}
.checkout-btn{width:100%;padding:14px;background:var(--yellow);border:none;border-radius:12px;color:var(--black);font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s}
.checkout-btn:hover{background:var(--yellow-dark);box-shadow:0 0 25px var(--yellow-glow);transform:translateY(-2px)}
.checkout-btn:disabled{background:#ccc;color:#888;cursor:not-allowed;transform:none;box-shadow:none}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:2px solid var(--border-color);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-header{padding:20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border-color);background:var(--black);border-radius:18px 18px 0 0}
.modal-header h2{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:var(--yellow)}
.modal-close{background:none;border:none;color:var(--yellow);font-size:1.5rem;cursor:pointer}
.modal-body{padding:25px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-size:0.9rem;font-weight:600;color:var(--text-secondary)}
.form-group input,.form-group textarea{width:100%;padding:12px;background:var(--bg-secondary);border:2px solid var(--border-color);color:var(--text-primary);border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1rem}
.form-group input:focus,.form-group textarea:focus{border-color:var(--yellow);outline:none;box-shadow:0 0 8px var(--yellow-glow)}
.form-group textarea{resize:vertical;min-height:60px}
.form-note{font-size:0.75rem;color:var(--text-muted);margin-top:3px}
.receipt{background:#fff;color:#000;padding:30px;border-radius:10px;border:2px solid #ddd;font-family:'Courier New',monospace}
.receipt-header{text-align:center;margin-bottom:20px;border-bottom:2px dashed #000;padding-bottom:15px}
.receipt-logo{width:60px;margin-bottom:8px}
.receipt-store{font-size:1.3rem;font-weight:700}
.receipt-id{font-size:0.85rem;color:#555;margin-top:5px}
.receipt-table{width:100%;border-collapse:collapse;margin:15px 0}
.receipt-table th{text-align:left;border-bottom:1px solid #000;padding:5px 0;font-size:0.8rem}
.receipt-table td{padding:4px 0;font-size:0.85rem}
.receipt-table .amt{text-align:right}
.receipt-totals{border-top:2px dashed #000;padding-top:10px;margin-top:10px}
.receipt-totals div{display:flex;justify-content:space-between;padding:3px 0;font-size:0.9rem}
.receipt-totals .grand{font-size:1.1rem;font-weight:700;border-top:1px solid #000;padding-top:8px;margin-top:5px}
.receipt-footer{text-align:center;margin-top:20px;border-top:2px dashed #000;padding-top:15px;font-size:0.8rem;color:#555}
.receipt-actions{display:flex;gap:10px;margin-top:15px;justify-content:center}
.receipt-actions button{padding:10px 20px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem}
.btn-download{background:var(--yellow);color:var(--black)}
.btn-whatsapp{background:#25D366;color:#fff}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:var(--yellow);color:var(--black);border:2px solid var(--yellow-dark);border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:'Rajdhani',sans-serif}
.google-btn:hover{background:var(--yellow-dark)}
.google-btn img{width:24px;height:24px}
.auth-info{margin-top:20px;font-size:0.85rem;color:var(--text-muted)}
.footer{margin-top:60px;padding:30px 20px;text-align:center;background:var(--black)}
.footer-brand{font-family:'Orbitron',sans-serif;font-size:1.3rem;color:var(--yellow);margin-bottom:5px}
.footer p{color:#888;font-size:0.85rem}
.toast-container{position:fixed;top:80px;right:20px;z-index:5000;display:flex;flex-direction:column;gap:10px}
.toast{padding:12px 20px;background:var(--black);border:2px solid var(--yellow);border-radius:10px;color:#fff;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:toast-in 0.3s ease;min-width:250px}
.toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
@keyframes toast-in{0%{opacity:0;transform:translateX(100px)}100%{opacity:1;transform:translateX(0)}}
.loading-spinner{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:40px;height:40px;border:3px solid #ddd;border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.nav-title{font-size:1.1rem}.user-name{display:none}.hero h1{font-size:1.6rem}.products-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}.product-img{height:140px}.nav-btn span{display:none}.nav-btn{padding:8px 10px}}
@media(max-width:480px){.products-grid{grid-template-columns:repeat(2,1fr);gap:10px}.product-info{padding:10px}.product-img{height:120px}}
</style>
</head>

<script>
const firebaseConfig={apiKey:"AIzaSyAJm0fEDPItyL6nBMWzWGQnSAjreDlCOpQ",authDomain:"ellectra-2b95d.firebaseapp.com",projectId:"ellectra-2b95d",storageBucket:"ellectra-2b95d.firebasestorage.app",messagingSenderId:"164410965069",appId:"1:164410965069:web:b86f8fd714f84c27e3f004"};

function showAuthModal(){document.getElementById('auth-modal').classList.add('open')}
function closeAuthModal(){document.getElementById('auth-modal').classList.remove('open')}
function signInWithGoogle(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(r=>{currentUser=r.user;updateAuthUI();closeAuthModal();showToast('Welcome!','success');db.collection('customers').doc(r.user.uid).set({name:r.user.displayName,email:r.user.email,photoURL:r.user.photoURL||'',lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}).catch(()=>showToast('Failed','error'));}

function updateAuthUI(){const a=document.getElementById('auth-area');if(currentUser){const p=currentUser.photoURL||'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName)+'&background=FFD700&color=000';a.innerHTML='<div class="user-info" onclick="signOut()" style="cursor:pointer" title="Sign out"><img src="'+p+'" class="user-avatar" referrerpolicy="no-referrer"><span class="user-name">'+currentUser.displayName.split(' ')[0]+'</span></div>';}else a.innerHTML='<button class="nav-btn" onclick="showAuthModal()"><i class="fas fa-bolt"></i><span>Sign In</span></button>';}
auth.onAuthStateChanged(u=>{currentUser=u;updateAuthUI();});

function loadProducts(){db.collection('components').orderBy('createdAt','desc').onSnapshot(s=>{products=[];const cats=new Set();s.forEach(d=>{const x={id:d.id,...d.data()};products.push(x);if(x.category)cats.add(x.category);});buildCats(cats);renderProducts();});}
function buildCats(cats){const c=document.getElementById('category-filters');let h='<button class="cat-btn active" onclick="setCategory(\'all\',this)">All</button>';cats.forEach(cat=>h+='<button class="cat-btn" onclick="setCategory(\''+cat+'\',this)">'+cat+'</button>');c.innerHTML=h;}
function setCategory(c,b){currentCategory=c;document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active');renderProducts();}
function filterProducts(){renderProducts();}
function renderProducts(){const g=document.getElementById('products-grid'),s=document.getElementById('search-input').value.toLowerCase();let f=products.filter(p=>{const ms=!s||p.name.toLowerCase().includes(s)||(p.category&&p.category.toLowerCase().includes(s));const mc=currentCategory==='all'||p.category===currentCategory;return ms&&mc;});if(!f.length){g.innerHTML='<div class="no-products"><i class="fas fa-search"></i><p>No components found</p></div>';return;}g.innerHTML=f.map(p=>{const inS=p.stock===undefined||p.stock>0;const ci=cart.find(c=>c.id===p.id);return`<div class="product-card"><div class="product-img"><img src="${p.image||'https://via.placeholder.com/200/f5f5f0/1a1a1a?text=No+Image'}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200/f5f5f0/1a1a1a?text=No+Image'"><span class="product-stock ${inS?'stock-in':'stock-out'}">${inS?(p.stock!==undefined?p.stock+' left':'In Stock'):'Out of Stock'}</span></div><div class="product-info"><div class="product-category">${p.category||'Component'}</div><div class="product-name">${p.name}</div><div class="product-price">${CURRENCY}${parseFloat(p.price).toFixed(2)}</div></div><button class="add-cart-btn" onclick="addToCart('${p.id}')" ${inS?'':'disabled'}>${!inS?'<i class="fas fa-times"></i> Out of Stock':(ci?'<i class="fas fa-check"></i> In Cart ('+ci.qty+')':'<i class="fas fa-cart-plus"></i> Add to Cart')}</button></div>`;}).join('');}

function addToCart(id){const p=products.find(x=>x.id===id);if(!p)return;const e=cart.find(c=>c.id===id);if(e){if(p.stock!==undefined&&e.qty>=p.stock){showToast('Max stock','error');return;}e.qty++;}else cart.push({id,qty:1,...p});updateCart();renderProducts();showToast(p.name+' added','success');}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCart();renderProducts();}
function changeQty(id,d){const i=cart.find(c=>c.id===id);if(!i)return;i.qty+=d;if(i.qty<=0){removeFromCart(id);return;}const p=products.find(x=>x.id===id);if(p&&p.stock!==undefined&&i.qty>p.stock){i.qty=p.stock;showToast('Max stock','error');}updateCart();}
function getDiscount(sub){if(sub>=2000)return{p:20,l:'Discount (20%)'};if(sub>=1000)return{p:10,l:'Discount (10%)'};return{p:0,l:''};}
function updateCart(){const el=document.getElementById('cart-items'),cc=document.getElementById('cart-count'),tc=cart.reduce((s,c)=>s+c.qty,0);cc.textContent=tc;cc.style.display=tc>0?'flex':'none';if(!cart.length){el.innerHTML='<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>Cart is empty</p></div>';appliedCoupon=null;document.getElementById('coupon-msg').className='coupon-msg';document.getElementById('coupon-input').value='';}else el.innerHTML=cart.map(i=>`<div class="cart-item"><div class="cart-item-img"><img src="${i.image||''}"></div><div class="cart-item-info"><div class="cart-item-name">${i.name}</div><div class="cart-item-price">${CURRENCY}${parseFloat(i.price).toFixed(2)}</div><div class="cart-item-qty"><button class="qty-btn" onclick="changeQty('${i.id}',-1)">−</button><span>${i.qty}</span><button class="qty-btn" onclick="changeQty('${i.id}',1)">+</button></div></div><button class="cart-item-remove" onclick="removeFromCart('${i.id}')"><i class="fas fa-trash"></i></button></div>`).join('');updateTotals();localStorage.setItem('ellectra_shop_cart',JSON.stringify(cart));}
function updateTotals(){const sub=cart.reduce((s,c)=>s+parseFloat(c.price)*c.qty,0);let disc=0,dl='';if(appliedCoupon){const di=getDiscount(sub);if(di.p>0){disc=sub*(di.p/100);dl=di.l;}else{appliedCoupon=null;document.getElementById('coupon-msg').className='coupon-msg error';document.getElementById('coupon-msg').textContent='Min ₹1000 required';}}const tot=sub-disc;document.getElementById('subtotal').textContent=CURRENCY+sub.toFixed(2);document.getElementById('discount-row').style.display=appliedCoupon&&disc>0?'flex':'none';document.getElementById('discount-label').textContent=dl;document.getElementById('discount-amount').textContent='-'+CURRENCY+disc.toFixed(2);document.getElementById('total-amount').textContent=CURRENCY+tot.toFixed(2);document.getElementById('checkout-btn').disabled=!cart.length;}
function toggleCart(){document.getElementById('cart-sidebar').classList.toggle('open');document.getElementById('cart-overlay').classList.toggle('open');}

async function applyCoupon(){const code=document.getElementById('coupon-input').value.trim(),m=document.getElementById('coupon-msg');if(!code){m.className='coupon-msg error';m.textContent='Enter code';return;}if(!cart.length){m.className='coupon-msg error';m.textContent='Add items first';return;}const sub=cart.reduce((s,c)=>s+parseFloat(c.price)*c.qty,0);if(sub<1000){m.className='coupon-msg error';m.textContent='Min ₹1000 order required';return;}try{const snap=await db.collection('coupons').where('code','==',code).get();if(snap.empty){m.className='coupon-msg error';m.textContent='Invalid code';appliedCoupon=null;updateTotals();return;}const doc=snap.docs[0],data=doc.data();if(data.used){m.className='coupon-msg error';m.textContent='Already used';appliedCoupon=null;updateTotals();return;}appliedCoupon={id:doc.id,...data};const di=getDiscount(sub);m.className='coupon-msg success';m.textContent='Applied! '+di.p+'% off!';updateTotals();showToast(di.p+'% OFF!','success');}catch(e){m.className='coupon-msg error';m.textContent='Error';}}

function handleCheckout(){if(!currentUser){showAuthModal();showToast('Sign in first','error');return;}if(!cart.length)return;toggleCart();document.getElementById('cust-name').value=currentUser.displayName||'';document.getElementById('cust-email').value=currentUser.email||'';const sub=cart.reduce((s,c)=>s+parseFloat(c.price)*c.qty,0);const di=appliedCoupon?getDiscount(sub):{p:0};const disc=sub*(di.p/100),tot=sub-disc;let s='<div style="background:var(--bg-secondary);padding:15px;border-radius:10px;margin-top:10px;border:2px solid var(--border-color)"><h3 style="color:var(--black);font-family:Orbitron,sans-serif;font-size:0.9rem;margin-bottom:10px">Order Summary</h3>';cart.forEach(i=>s+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.9rem"><span>${i.name} × ${i.qty}</span><span>${CURRENCY}${(parseFloat(i.price)*i.qty).toFixed(2)}</span></div>`);s+=`<div style="border-top:2px solid var(--border-color);margin-top:8px;padding-top:8px"><div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>${CURRENCY}${sub.toFixed(2)}</span></div>`;if(appliedCoupon&&disc>0)s+=`<div style="display:flex;justify-content:space-between;color:var(--success)"><span>Discount (${di.p}%)</span><span>-${CURRENCY}${disc.toFixed(2)}</span></div>`;s+=`<div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;margin-top:5px;font-family:Orbitron,sans-serif"><span>Total</span><span>${CURRENCY}${tot.toFixed(2)}</span></div></div></div>`;document.getElementById('checkout-summary').innerHTML=s;document.getElementById('checkout-modal').classList.add('open');}
function closeCheckoutModal(){document.getElementById('checkout-modal').classList.remove('open')}

async function placeOrder(){const n=document.getElementById('cust-name').value.trim(),ph=document.getElementById('cust-phone').value.trim(),em=document.getElementById('cust-email').value.trim(),ad=document.getElementById('cust-address').value.trim(),nt=document.getElementById('cust-notes').value.trim();if(!n||!ph||!ad){showToast('Fill required fields','error');return;}const btn=document.getElementById('place-order-btn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';try{const sub=cart.reduce((s,c)=>s+parseFloat(c.price)*c.qty,0);const di=appliedCoupon?getDiscount(sub):{p:0};const disc=sub*(di.p/100),tot=sub-disc;const rid='ELC-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,4).toUpperCase();const od={receiptId:rid,customerName:n,customerPhone:ph,customerEmail:em,customerAddress:ad,customerNotes:nt,customerUid:currentUser.uid,items:cart.map(c=>({id:c.id,name:c.name,price:parseFloat(c.price),qty:c.qty,category:c.category||'',image:c.image||''})),subtotal:sub,couponCode:appliedCoupon?appliedCoupon.code:null,couponId:appliedCoupon?appliedCoupon.id:null,discount:disc,discountPercent:di.p,totalAmount:tot,status:'pending',orderedAt:firebase.firestore.FieldValue.serverTimestamp(),orderDate:new Date().toISOString(),type:'shop'};await db.collection('orders').add(od);if(appliedCoupon)await db.collection('coupons').doc(appliedCoupon.id).update({used:true,usedBy:currentUser.email,usedAt:firebase.firestore.FieldValue.serverTimestamp()});for(const i of cart){const p=products.find(x=>x.id===i.id);if(p&&p.stock!==undefined)await db.collection('components').doc(i.id).update({stock:firebase.firestore.FieldValue.increment(-i.qty)});}lastOrderData={...od,orderDate:new Date().toISOString()};closeCheckoutModal();showReceipt(lastOrderData);sendWA(lastOrderData);cart=[];appliedCoupon=null;updateCart();renderProducts();localStorage.removeItem('ellectra_shop_cart');showToast('Order placed!','success');}catch(e){showToast('Failed','error');}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-bolt"></i> PLACE ORDER';}}

function showReceipt(o){const d=new Date(o.orderDate),ds=d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),ts=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});let ih='';o.items.forEach(i=>ih+=`<tr><td>${i.name}</td><td style="text-align:center">${i.qty}</td><td class="amt">${CURRENCY}${i.price.toFixed(2)}</td><td class="amt">${CURRENCY}${(i.price*i.qty).toFixed(2)}</td></tr>`);document.getElementById('receipt-content').innerHTML=`<div class="receipt" id="receipt-printable"><div class="receipt-header"><img src="${LOGO}" class="receipt-logo"><div class="receipt-store">ELLECTRA</div><div style="font-size:0.8rem;color:#777">Component Shop</div><div class="receipt-id" style="margin-top:8px"><strong>Receipt:</strong> ${o.receiptId}<br><strong>Date:</strong> ${ds} ${ts}</div></div><div style="margin:10px 0;font-size:0.85rem"><div><strong>Customer:</strong> ${o.customerName}</div><div><strong>Phone:</strong> ${o.customerPhone}</div><div><strong>Address:</strong> ${o.customerAddress}</div></div><table class="receipt-table"><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th class="amt">Price</th><th class="amt">Total</th></tr></thead><tbody>${ih}</tbody></table><div class="receipt-totals"><div><span>Subtotal:</span><span>${CURRENCY}${o.subtotal.toFixed(2)}</span></div>${o.couponCode?`<div style="color:green"><span>Discount (${o.discountPercent}%):</span><span>-${CURRENCY}${o.discount.toFixed(2)}</span></div>`:''}<div class="grand"><span>TOTAL:</span><span>${CURRENCY}${o.totalAmount.toFixed(2)}</span></div></div><div class="receipt-footer"><div>Thank you!</div><div style="margin-top:5px">Payment: Cash on Delivery</div></div></div>`;document.getElementById('receipt-modal').classList.add('open');}
function closeReceiptModal(){document.getElementById('receipt-modal').classList.remove('open')}
function downloadReceipt(){html2canvas(document.getElementById('receipt-printable'),{backgroundColor:'#fff',scale:2,useCORS:true}).then(c=>{const l=document.createElement('a');l.download='Ellectra_'+((lastOrderData&&lastOrderData.receiptId)||'receipt')+'.png';l.href=c.toDataURL();l.click();showToast('Downloaded!','success');}).catch(()=>window.print());}
function sendWA(o){let m='*NEW ORDER - ELLECTRA*\n\nReceipt: '+o.receiptId+'\nDate: '+new Date(o.orderDate).toLocaleString('en-IN')+'\n\nCustomer: '+o.customerName+'\nPhone: '+o.customerPhone+'\nEmail: '+o.customerEmail+'\nAddress: '+o.customerAddress+'\n';if(o.customerNotes)m+='Notes: '+o.customerNotes+'\n';m+='\n--- ITEMS ---\n';o.items.forEach((i,x)=>m+='\n'+(x+1)+'. '+i.name+' × '+i.qty+' = '+CURRENCY+(i.price*i.qty).toFixed(2));m+='\n\n---\nSubtotal: '+CURRENCY+o.subtotal.toFixed(2);if(o.couponCode)m+='\nCoupon: '+o.couponCode+' ('+o.discountPercent+'%)\nDiscount: -'+CURRENCY+o.discount.toFixed(2);m+='\nTOTAL: '+CURRENCY+o.totalAmount.toFixed(2)+'\n\nStatus: Pending';window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(m),'_blank');}
function shareWhatsApp(){if(lastOrderData)sendWA(lastOrderData);}
function showToast(msg,type='success'){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast '+type;t.innerHTML='<i class="fas '+(type==='success'?'fa-check-circle':'fa-exclamation-circle')+'" style="color:'+(type==='success'?'var(--success)':'var(--danger)')+'"></i>'+msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(100px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},3000);}
window.addEventListener('DOMContentLoaded',()=>{loadProducts();try{const s=localStorage.getItem('ellectra_shop_cart');if(s)cart=JSON.parse(s);}catch(e){}updateCart();});
</script>
</body>
</html>
